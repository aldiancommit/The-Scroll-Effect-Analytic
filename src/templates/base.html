<!doctype html>
<html lang="id" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The Scroll Effect</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          fontFamily: { sans: ["Inter", "sans-serif"] },
          extend: {
            colors: {
              slate: { 850: "#151e2e", 900: "#0f172a" },
              accent: { 400: "#22d3ee", 500: "#06b6d4", 600: "#0891b2" },
            },
            animation: { "fade-in-up": "fadeInUp 0.8s ease-out forwards" },
            keyframes: {
              fadeInUp: {
                "0%": { opacity: "0", transform: "translateY(20px)" },
                "100%": { opacity: "1", transform: "translateY(0)" },
              },
            },
          },
        },
      };
    </script>
    <style>
      .glass-panel {
        background: rgba(30, 41, 59, 0.7);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.08);
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      }
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #0f172a;
      }
      ::-webkit-scrollbar-thumb {
        background: #334155;
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #475569;
      }
      .input-elegant {
        background: rgba(15, 23, 42, 0.6);
        border: 1px solid rgba(255, 255, 255, 0.1);
        color: #f8fafc;
        transition: all 0.3s ease;
      }
      .input-elegant:focus {
        border-color: #22d3ee;
        box-shadow: 0 0 0 4px rgba(34, 211, 238, 0.1);
        background: rgba(15, 23, 42, 0.9);
      }

      /* Optimasi Sentuhan untuk Mobile */
      @media (max-width: 768px) {
        html {
          font-size: 14px;
        } /* Menyesuaikan base font size */
        .glass-panel {
          padding: 1.5rem;
        }
      }

      /* Mencegah zoom otomatis pada input iOS saat fokus */
      input,
      select,
      textarea {
        font-size: 16px !important;
      }
    </style>
  </head>
  <body
    class="bg-slate-900 text-slate-200 antialiased min-h-screen flex flex-col relative overflow-x-hidden"
  >
    <div
      class="absolute top-0 left-1/2 -translate-x-1/2 w-[800px] h-[500px] bg-accent-600/20 rounded-full blur-[120px] pointer-events-none z-0"
    ></div>

    <nav
      class="fixed w-full z-50 glass-panel border-b-0 border-white/5 py-4 px-6"
    >
      <div class="max-w-6xl mx-auto flex justify-between items-center">
        <div
          class="text-xl font-bold tracking-tight text-white flex items-center gap-2"
        >
          <span class="w-2 h-2 rounded-full bg-accent-400 animate-pulse"></span>
          Monitoring <span class="text-slate-400 font-light">| Addiction</span>
        </div>
        <a
          href="#quest-form"
          class="text-sm font-medium text-slate-300 hover:text-white transition-all"
          >Sistem Evaluasi</a
        >
      </div>
    </nav>

    <main class="flex-grow">{% block content %}{% endblock %}</main>

    <footer
      class="mt-auto py-8 border-t border-slate-800 text-center relative z-10"
    >
      <p class="text-slate-500 text-sm font-medium">The Scroll Effect © 2026</p>
      <p class="text-slate-600 text-xs mt-1">
        Engineered with Random Forest Regressor
      </p>
    </footer>
  </body>
</html>
